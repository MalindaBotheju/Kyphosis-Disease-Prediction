name: Kyphosis CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest 

    steps:
    - name: 📥 Download latest code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11' # Matches your Dockerfile!

    - name: 📦 Install Requirements
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🧪 Run Automated Tests (pytest)
      # This runs your test_app.py file! If tests fail, the pipeline stops here.
      run: pytest

    - name: 🐳 Set up Docker
      uses: docker/setup-buildx-action@v3

    - name: ⚙️ Test Docker Build
      run: docker build -t kyphosis-test .