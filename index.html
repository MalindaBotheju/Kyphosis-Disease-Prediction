<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyphosis Prediction App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white rounded-2xl shadow-xl max-w-4xl w-full flex overflow-hidden">
        
        <div class="w-1/2 p-8">
            <h2 class="text-3xl font-bold text-gray-800 mb-6">Patient Screening</h2>
            
            <form method="POST" action="/" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Age (in months)</label>
                    <input type="number" name="age" value="{{ form_data.age }}" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:border-blue-500 focus:ring-blue-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700">Number of Vertebrae Involved</label>
                    <input type="number" name="number" value="{{ form_data.number }}" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:border-blue-500 focus:ring-blue-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700">Start (Topmost Vertebra Operated On)</label>
                    <input type="number" name="start" value="{{ form_data.start }}" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:border-blue-500 focus:ring-blue-500">
                </div>
                
                <div class="flex gap-4 pt-2">
                    <button type="submit" class="w-2/3 bg-blue-600 text-white rounded-md py-2 px-4 hover:bg-blue-700 font-semibold transition duration-200">
                        Run Prediction
                    </button>
                    <a href="/" class="w-1/3 text-center bg-gray-200 text-gray-700 rounded-md py-2 px-4 hover:bg-gray-300 font-semibold transition duration-200">
                        Clear
                    </a>
                </div>
            </form>
        </div>

        <div class="w-1/2 bg-gray-50 p-8 flex flex-col items-center justify-center border-l border-gray-200">
            
            {% if prediction == 'present' %}
                <div class="text-center w-full">
                    <h3 class="text-2xl font-bold text-red-600 mb-2">Kyphosis Detected</h3>
                    <p class="text-gray-600 mb-6">The model predicts the deformity is present.</p>
                    
                    <div class="flex justify-center gap-4">
                        <img src="{{ url_for('static', filename='kyphosis.png') }}" alt="Kyphosis Present" class="rounded-lg shadow-md h-40 w-40 object-cover border-2 border-red-200">
                        <img src="{{ url_for('static', filename='kyphosis_1.png') }}" alt="Kyphosis Diagram" class="rounded-lg shadow-md h-40 w-40 object-cover border-2 border-red-200 bg-white">
                    </div>
                </div>
            
            {% elif prediction == 'absent' %}
                <div class="text-center w-full">
                    <h3 class="text-2xl font-bold text-green-600 mb-2">Normal Spine</h3>
                    <p class="text-gray-600 mb-6">The model predicts no deformity (absent).</p>
                    
                    <div class="flex justify-center gap-4">
                        <img src="{{ url_for('static', filename='normal.png') }}" alt="Normal Spine" class="rounded-lg shadow-md h-40 w-40 object-cover border-2 border-green-200 bg-white">
                        <img src="{{ url_for('static', filename='normal_1.png') }}" alt="Normal X-Ray" class="rounded-lg shadow-md h-40 w-40 object-cover border-2 border-green-200">
                    </div>
                </div>
                
            {% else %}
                <div class="text-center text-gray-400">
                    <svg class="w-16 h-16 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <p>Enter patient details to see the prediction.</p>
                </div>
            {% endif %}
            
        </div>
    </div>

</body>
</html>
